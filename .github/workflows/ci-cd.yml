name: CI/CD Pipelines

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── CI: Install, Test & Build ───────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Server (Node.js) ──
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server dependencies
        working-directory: ./server
        run: npm install

      - name: Run server tests (if any)
        working-directory: ./server
        run: npm test --if-present

      # ── Client (React) ──
      - name: Install client dependencies
        working-directory: ./client
        run: npm install

      - name: Build React app
        working-directory: ./client
        run: npm run build

  # ─── CD: Deploy (runs only on push to main) ──────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build                      # Only runs if build passes
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        run: echo "Add your deploy command here"
        # Example: SSH into server, push to Render, Railway, etc.